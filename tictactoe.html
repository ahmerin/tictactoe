<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #3b2f2f;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      letter-spacing: 2px;
      color: #c8a165;
    }

    #status {
      font-size: 1.1rem;
      margin-bottom: 1.5rem;
      min-height: 1.5rem;
      color: #d4b483;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #5c3d2e;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #7a4f35;
      transform: scale(1.05);
    }

    .cell.x { color: #c0392b; }
    .cell.o { color: #a3b899; }

    .cell.win {
      background: #7a4f35;
      outline: 3px solid #c8a165;
    }

    #reset {
      margin-top: 1.5rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      background: #8b5e3c;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #reset:hover { background: #6b4226; }

    #scores {
      display: flex;
      gap: 2rem;
      margin-bottom: 1rem;
      font-size: 1rem;
      color: #ccc;
    }

    #scores span { font-weight: bold; color: #fff; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="scores">
    X wins: <span id="score-x">0</span>
    &nbsp;|&nbsp;
    Draws: <span id="score-draw">0</span>
    &nbsp;|&nbsp;
    O wins: <span id="score-o">0</span>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
  </div>

  <button id="reset">New Game</button>

  <script>
    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const resetBtn = document.getElementById('reset');
    const scoreX = document.getElementById('score-x');
    const scoreO = document.getElementById('score-o');
    const scoreDraw = document.getElementById('score-draw');

    const WIN_LINES = [
      [0,1,2],[3,4,5],[6,7,8], // rows
      [0,3,6],[1,4,7],[2,5,8], // cols
      [0,4,8],[2,4,6]           // diagonals
    ];

    let board, currentPlayer, gameOver;
    let scores = { X: 0, O: 0, draw: 0 };

    function init() {
      board = Array(9).fill(null);
      currentPlayer = 'X';
      gameOver = false;
      cells.forEach(cell => {
        cell.textContent = '';
        cell.className = 'cell';
      });
      status.textContent = "X's turn";
    }

    function checkWinner() {
      for (const [a, b, c] of WIN_LINES) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line: [a, b, c] };
        }
      }
      if (board.every(Boolean)) return { winner: null, draw: true };
      return null;
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = parseInt(cell.dataset.index);
        if (gameOver || board[i]) return;

        board[i] = currentPlayer;
        cell.textContent = currentPlayer;
        cell.classList.add(currentPlayer.toLowerCase(), 'taken');

        const result = checkWinner();
        if (result) {
          gameOver = true;
          if (result.winner) {
            result.line.forEach(idx => cells[idx].classList.add('win'));
            status.textContent = `${result.winner} wins!`;
            scores[result.winner]++;
          } else {
            status.textContent = "It's a draw!";
            scores.draw++;
          }
          scoreX.textContent = scores.X;
          scoreO.textContent = scores.O;
          scoreDraw.textContent = scores.draw;
        } else {
          currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
          status.textContent = `${currentPlayer}'s turn`;
        }
      });
    });

    resetBtn.addEventListener('click', init);

    init();
  </script>
</body>
</html>
